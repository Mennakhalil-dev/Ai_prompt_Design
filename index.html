<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f1a;
  --bg2: #13162a;
  --bg3: #1a1e35;
  --card: #1e2340;
  --card-hover: #252b4a;
  --border: #2e3560;
  --border-light: #3d4575;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --accent4: #f9ca24;
  --accent5: #38bdf8;
  --text: #e8eaf6;
  --text2: #9fa8da;
  --text3: #5c6bc0;
  --tag-bg: rgba(108,99,255,0.15);
  --glass: rgba(13,15,26,0.85);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --radius: 16px;
}
.light {
  --bg: #f0f2ff;
  --bg2: #e8eaf6;
  --bg3: #ffffff;
  --card: #ffffff;
  --card-hover: #f5f6ff;
  --border: #c5cae9;
  --border-light: #9fa8da;
  --text: #1a1e35;
  --text2: #3949ab;
  --text3: #7986cb;
  --tag-bg: rgba(108,99,255,0.10);
  --glass: rgba(240,242,255,0.92);
  --shadow: 0 8px 32px rgba(108,99,255,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(108,99,255,.1) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(255,101,132,.07) 0%,transparent 55%),radial-gradient(ellipse at 50% 50%,rgba(67,233,123,.04) 0%,transparent 65%);pointer-events:none;z-index:0;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 15px rgba(108,99,255,.35);flex-shrink:0;}
.logo-text{font-size:18px;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:10px;color:var(--text3);display:block;margin-top:-3px;}
.search-wrap{position:relative;flex:1;max-width:360px;min-width:180px;}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 42px 9px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;outline:none;transition:all .2s;}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.18);}
.search-wrap input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;}
.header-actions{display:flex;align-items:center;gap:10px;margin-right:auto;}
.btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:10px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;transition:all .2s;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 4px 14px rgba(108,99,255,.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,99,255,.4);}
.btn-ghost{background:var(--card);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--card-hover);color:var(--text);}
.theme-toggle{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;}
.theme-toggle:hover{transform:rotate(20deg);}

/* ── TABS ── */
.tabs-bar{position:sticky;top:71px;z-index:90;background:var(--glass);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:4px;}
.tab-btn{padding:14px 22px;border:none;background:transparent;color:var(--text3);font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-count{font-size:11px;background:var(--tag-bg);color:var(--accent);border-radius:20px;padding:2px 8px;font-weight:700;}

/* ── MAIN ── */
main{position:relative;z-index:1;padding:28px;max-width:1400px;margin:0 auto;}
.tab-section{display:none;}
.tab-section.active{display:block;}

/* ── STATS ── */
.stats-bar{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 20px;display:flex;align-items:center;gap:10px;flex:1;min-width:130px;}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.si-purple{background:rgba(108,99,255,.15);}
.si-pink{background:rgba(255,101,132,.15);}
.si-green{background:rgba(67,233,123,.15);}
.si-blue{background:rgba(56,189,248,.15);}
.si-yellow{background:rgba(249,202,36,.15);}
.stat-num{font-size:20px;font-weight:900;color:var(--text);}
.stat-label{font-size:11px;color:var(--text3);}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center;}
.filter-label{color:var(--text3);font-size:12px;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(108,99,255,.3);}
.view-toggle{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px;margin-right:auto;}
.view-btn{width:30px;height:30px;border-radius:7px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;}
.view-btn.active{background:var(--accent);color:#fff;}

/* ── GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;}
.cards-grid.list-view{grid-template-columns:1fr;}

/* ── PROMPT CARD ── */
/* ── PROMPT CARD ── */
.prompt-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .3s;cursor:pointer;position:relative;animation:fadeUp .4s ease both;display:flex;flex-direction:column;}
.prompt-card:hover{border-color:var(--border-light);transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.35);}
.card-img-wrap{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--bg2);flex-shrink:0;}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
.prompt-card:hover .card-img-wrap img{transform:scale(1.06);}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,var(--bg3),var(--bg2));}
.card-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.5));pointer-events:none;}
.card-tool-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid;font-weight:700;backdrop-filter:blur(8px);}
.card-header{padding:14px 16px 6px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-num{font-size:10px;font-weight:700;color:var(--text3);background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;flex-shrink:0;}
.card-title{font-size:15px;font-weight:900;color:var(--text);flex:1;line-height:1.4;}
.card-body{padding:0 16px 12px;flex:1;}
.card-purpose{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-prompt-preview{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:10px;font-size:11px;color:var(--text2);line-height:1.6;direction:ltr;text-align:left;font-family:'Tajawal',monospace;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;position:relative;}
.card-prompt-preview::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:linear-gradient(transparent,var(--bg2));}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.tag{font-size:10px;padding:2px 9px;border-radius:20px;background:var(--tag-bg);color:var(--accent);border:1px solid rgba(108,99,255,.2);font-weight:700;}
.card-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:7px;margin-top:auto;}
.copy-btn{display:flex;align-items:center;gap:5px;padding:8px 13px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;flex:1;justify-content:center;}
.copy-btn:hover{transform:scale(1.03);box-shadow:0 4px 12px rgba(108,99,255,.4);}
.copy-btn.copied{background:linear-gradient(135deg,var(--accent3),#10b981);}
.expand-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;}
.expand-btn:hover{background:var(--card-hover);color:var(--text);}
.img-upload-wrap{border:2px dashed var(--border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.img-upload-wrap:hover{border-color:var(--accent);background:var(--tag-bg);}
.img-upload-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-preview{width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-top:10px;display:none;}

/* ── RESOURCE CARD ── */
.resource-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .3s;cursor:pointer;position:relative;animation:fadeUp .4s ease both;}
.resource-card:hover{border-color:var(--border-light);background:var(--card-hover);transform:translateY(-4px);box-shadow:var(--shadow);}
.resource-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .2s;}
.resource-card:hover::before{opacity:1;}
.resource-card[data-type="pdf"]::before{background:linear-gradient(90deg,#ff6584,#ff8fab);}
.resource-card[data-type="image"]::before{background:linear-gradient(90deg,#43e97b,#38bdf8);}
.resource-card[data-type="video"]::before{background:linear-gradient(90deg,#f9ca24,#f0932b);}
.resource-card[data-type="note"]::before{background:linear-gradient(90deg,#6c63ff,#8b5cf6);}

.res-top{padding:16px 18px 12px;display:flex;align-items:flex-start;gap:12px;}
.res-type-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.res-type-icon.pdf{background:rgba(255,101,132,.15);}
.res-type-icon.image{background:rgba(67,233,123,.15);}
.res-type-icon.video{background:rgba(249,202,36,.15);}
.res-type-icon.note{background:rgba(108,99,255,.15);}
.res-info{flex:1;}
.res-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:4px;}
.res-meta{font-size:11px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;}
.res-desc{padding:0 18px 14px;font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.res-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.res-link-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:none;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;flex:1;justify-content:center;text-decoration:none;}
.res-link-btn.pdf-btn{background:rgba(255,101,132,.15);color:#ff6584;border:1px solid rgba(255,101,132,.3);}
.res-link-btn.pdf-btn:hover{background:rgba(255,101,132,.25);}
.res-link-btn.img-btn{background:rgba(67,233,123,.15);color:#43e97b;border:1px solid rgba(67,233,123,.3);}
.res-link-btn.img-btn:hover{background:rgba(67,233,123,.25);}
.res-link-btn.vid-btn{background:rgba(249,202,36,.15);color:#f9ca24;border:1px solid rgba(249,202,36,.3);}
.res-link-btn.vid-btn:hover{background:rgba(249,202,36,.25);}
.res-link-btn.note-btn{background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3);}
.res-link-btn.note-btn:hover{background:rgba(108,99,255,.25);}

/* ── TYPE FILTER PILLS ── */
.type-pill{display:flex;align-items:center;gap:5px;}
.type-pill-dot{width:8px;height:8px;border-radius:50%;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border-light);border-radius:20px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.5);transform:scale(.95);transition:transform .2s;}
.modal-overlay.open .modal{transform:scale(1);}
.modal-header{padding:22px 26px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;position:sticky;top:0;background:var(--bg2);z-index:1;}
.modal-title{font-size:19px;font-weight:900;color:var(--text);}
.modal-close{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.modal-close:hover{background:var(--accent2);color:#fff;border-color:var(--accent2);}
.modal-body{padding:22px 26px;}
.modal-section{margin-bottom:18px;}
.modal-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.modal-prompt-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:13px;color:var(--text2);line-height:1.7;direction:ltr;text-align:left;font-family:'Tajawal',monospace;white-space:pre-wrap;word-break:break-word;}
.modal-text{font-size:13px;color:var(--text2);line-height:1.7;}
.modal-footer{padding:14px 26px 22px;display:flex;gap:9px;}
.modal-copy-btn{flex:1;padding:11px 18px;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.modal-copy-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,99,255,.4);}
.modal-copy-btn.copied{background:linear-gradient(135deg,var(--accent3),#10b981);}

/* ── ADD PANEL ── */
.add-panel{position:fixed;top:0;left:0;width:420px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);z-index:150;overflow-y:auto;transform:translateX(-100%);transition:transform .3s ease;box-shadow:8px 0 30px rgba(0,0,0,.3);}
.add-panel.open{transform:translateX(0);}
.panel-header{padding:22px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
.panel-title{font-size:17px;font-weight:900;color:var(--text);}
.panel-body{padding:18px 22px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 13px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;outline:none;transition:all .2s;resize:vertical;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.13);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text3);}
.form-textarea{min-height:90px;}
.form-select option{background:var(--bg2);}
.type-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.type-opt{padding:10px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--text2);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
.type-opt:hover{border-color:var(--border-light);}
.type-opt.selected{border-color:var(--accent);background:var(--tag-bg);color:var(--accent);}
.type-opt-icon{font-size:22px;}
.save-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;border-radius:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:6px;}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,99,255,.4);}
.panel-tabs{display:flex;gap:3px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:18px;}
.panel-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--text3);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:8px;transition:all .2s;}
.panel-tab.active{background:var(--accent);color:#fff;}

/* ── EMPTY / NO RESULTS ── */
.empty-state{text-align:center;padding:70px 20px;display:none;}
.empty-state.show{display:block;}
.no-results{grid-column:1/-1;text-align:center;padding:55px 20px;display:none;}
.no-results.show{display:block;}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent3);color:#fff;padding:11px 22px;border-radius:12px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── NOTE VIEWER ── */
.note-content-area{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:13px;color:var(--text2);line-height:1.8;white-space:pre-wrap;max-height:300px;overflow-y:auto;}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.cards-grid .prompt-card:nth-child(1),.cards-grid .resource-card:nth-child(1){animation-delay:.05s;}
.cards-grid .prompt-card:nth-child(2),.cards-grid .resource-card:nth-child(2){animation-delay:.10s;}
.cards-grid .prompt-card:nth-child(3),.cards-grid .resource-card:nth-child(3){animation-delay:.15s;}
.cards-grid .prompt-card:nth-child(4),.cards-grid .resource-card:nth-child(4){animation-delay:.20s;}
.cards-grid .prompt-card:nth-child(5),.cards-grid .resource-card:nth-child(5){animation-delay:.25s;}
.cards-grid .prompt-card:nth-child(6),.cards-grid .resource-card:nth-child(6){animation-delay:.30s;}

.list-view .res-desc{-webkit-line-clamp:1;}

@media(max-width:640px){
  header{padding:10px 14px;}
  .tabs-bar{padding:0 14px;}
  main{padding:18px 14px;}
  .add-panel{width:100%;}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">✨</div>
    <div>
      <div class="logo-text">مكتبة AI</div>
      <span class="logo-sub">AI Resource Library</span>
    </div>
  </a>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="ابحث..." oninput="renderAll()">
    <span class="search-icon">🔍</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" id="addBtn" onclick="openPanel()">➕ إضافة</button>

// ─── TOOL COLORS ──────────────────────────────────────────────────────────
const TOOL_C={
  'Midjourney':{bg:'rgba(108,99,255,.12)',color:'#6c63ff',border:'rgba(108,99,255,.3)'},
  'DALL-E':{bg:'rgba(255,101,132,.12)',color:'#ff6584',border:'rgba(255,101,132,.3)'},
  'Firefly':{bg:'rgba(249,202,36,.12)',color:'#f9ca24',border:'rgba(249,202,36,.3)'},
  'Stable':{bg:'rgba(67,233,123,.12)',color:'#43e97b',border:'rgba(67,233,123,.3)'},
};
function toolStyle(t){
  for(const k in TOOL_C) if(t&&t.includes(k)) return TOOL_C[k];
  return {bg:'rgba(100,120,200,.12)',color:'#9fa8da',border:'rgba(100,120,200,.3)'};
}

const TYPE_META={
  pdf:{icon:'📄',cls:'pdf',btnCls:'pdf-btn',btnLabel:'📄 فتح / تحميل'},
  image:{icon:'🖼️',cls:'image',btnCls:'img-btn',btnLabel:'🖼️ عرض الصورة'},
  video:{icon:'🎬',cls:'video',btnCls:'vid-btn',btnLabel:'▶️ مشاهدة الفيديو'},
  note:{icon:'📝',cls:'note',btnCls:'note-btn',btnLabel:'📖 قراءة الملاحظة'},
};

// ─── CATEGORY EMOJI ──────────────────────────────────────────────────────
function getCategoryEmoji(cat){
  if(!cat) return '✨';
  const c=cat.toLowerCase();
  if(c.includes('product')||c.includes('منتج')) return '🛍️';
  if(c.includes('fashion')||c.includes('أزياء')) return '👗';
  if(c.includes('camera')||c.includes('angle')||c.includes('زاوية')) return '🎬';
  if(c.includes('logo')) return '🎨';
  if(c.includes('social')||c.includes('سوشيال')) return '📱';
  if(c.includes('portrait')||c.includes('بورتريه')) return '🖼️';
  if(c.includes('poster')||c.includes('بوستر')) return '🎭';
  if(c.includes('3d')) return '🧊';
  return '✨';
}

// ─── RENDER PROMPTS ───────────────────────────────────────────────────────
function renderPrompts(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered=prompts.filter(p=>{
    const mc=pFilter==='all'||p.category===pFilter;
    const mq=!q||[p.title,p.category,p.tool,p.purpose,p.prompt,...(p.tags||[])].join(' ').toLowerCase().includes(q);
    return mc&&mq;
  });
  const grid=document.getElementById('promptsGrid');
  grid.className='cards-grid'+(pView==='list'?' list-view':'');
  grid.innerHTML=filtered.map((p,i)=>{
    const ts=toolStyle(p.tool);
    const imgHtml=p.image
      ?`<img src="${p.image}" alt="${esc(p.title)}" loading="lazy">`
      :`<div class="card-img-placeholder">${getCategoryEmoji(p.category)}</div>`;
    return `<div class="prompt-card" style="animation-delay:${(i%6)*.05}s" onclick="openPromptModal(${p.id})">
      <div class="card-img-wrap">
        ${imgHtml}
        <div class="card-img-overlay"></div>
        ${p.tool?`<span class="card-tool-badge" style="background:${ts.bg};color:${ts.color};border-color:${ts.border}">${esc(p.tool)}</span>`:''}
      </div>
      <div class="card-header">
        <span class="card-num">#${String(p.id).padStart(2,'0')}</span>
        <div class="card-title">${esc(p.title)}</div>
      </div>
      <div class="card-body">
        ${p.purpose?`<div class="card-purpose">${esc(p.purpose)}</div>`:''}
        <div class="card-prompt-preview">${esc(p.prompt)}</div>
        ${p.tags&&p.tags.length?`<div class="card-tags">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
      </div>
      <div class="card-footer">
        <button class="copy-btn" id="copy-${p.id}" onclick="copyP(event,${p.id})">📋 نسخ البرومبت</button>
        <button class="expand-btn" onclick="openPromptModal(${p.id});event.stopPropagation()">⤢</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('p-empty').classList.toggle('show',prompts.length===0);
  document.getElementById('p-nores').classList.toggle('show',prompts.length>0&&filtered.length===0);
  document.getElementById('p-total').textContent=prompts.length;
  document.getElementById('p-cats').textContent=[...new Set(prompts.map(p=>p.category).filter(Boolean))].length;
  document.getElementById('p-tools').textContent=[...new Set(prompts.map(p=>p.tool).filter(Boolean))].length;
  document.getElementById('tab-count-prompts').textContent=prompts.length;

  // dynamic category filters
  const bar=document.getElementById('p-filters');
  bar.querySelectorAll('.dyn-f').forEach(e=>e.remove());
  const vt=bar.querySelector('.view-toggle');
  [...new Set(prompts.map(p=>p.category).filter(Boolean))].forEach(cat=>{
    const b=document.createElement('button');
    b.className='filter-btn dyn-f'+(pFilter===cat?' active':'');
    b.textContent=cat; b.onclick=()=>setPFilter(cat,b);
    bar.insertBefore(b,vt);
  });
}

function setPFilter(f,el){ pFilter=f; document.querySelectorAll('#p-filters .filter-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); renderPrompts(); }

// ─── COPY ─────────────────────────────────────────────────────────────────
function copyP(e,id){
  e.stopPropagation();
  const p=prompts.find(x=>x.id===id); if(!p) return;
  navigator.clipboard.writeText(p.prompt).then(()=>{
    const btn=document.getElementById('copy-'+id);
    if(btn){btn.textContent='✅ تم النسخ!';btn.classList.add('copied');}
    toast();
    setTimeout(()=>{if(btn){btn.innerHTML='📋 نسخ البرومبت';btn.classList.remove('copied');}},2000);
  });
}
function toast(msg='✅ تم!'){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400);
}

// ─── MODALS ───────────────────────────────────────────────────────────────
function openPromptModal(id){
  const p=prompts.find(x=>x.id===id); if(!p) return;
  currentModalId=id; currentModalKind='prompt';
  const ts=toolStyle(p.tool);
  document.getElementById('modal-title').textContent=p.title;
  document.getElementById('modal-meta').innerHTML=
    (p.category?`<span class="tag">${esc(p.category)}</span>`:'')+
    (p.tool?`<span class="card-tool-badge" style="background:${ts.bg};color:${ts.color};border-color:${ts.border}">${esc(p.tool)}</span>`:'')+
    (p.created?`<span style="font-size:11px;color:var(--text3)">${esc(p.created)}</span>`:'');
  document.getElementById('modal-body').innerHTML=
    (p.purpose?`<div class="modal-section"><div class="modal-section-title">🎯 الغرض</div><div class="modal-text">${esc(p.purpose)}</div></div>`:'')+
    `<div class="modal-section"><div class="modal-section-title">✍️ البرومبت</div><div class="modal-prompt-box">${esc(p.prompt)}</div></div>`+
    (p.tips?`<div class="modal-section"><div class="modal-section-title">💡 تيبس</div><div class="modal-text">${esc(p.tips)}</div></div>`:'')+
    (p.tags&&p.tags.length?`<div class="modal-section"><div class="modal-section-title">🏷️ تاجات</div><div class="card-tags">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`:'');
  document.getElementById('modal-footer').innerHTML=
    `<button class="modal-copy-btn" id="mcopy" onclick="copyFromModal()">📋 نسخ البرومبت</button>
     <button class="btn btn-ghost" onclick="editPrompt(${id})" style="flex-shrink:0">✏️</button>
     <button class="btn btn-ghost" onclick="deletePrompt(${id})" style="flex-shrink:0;color:var(--accent2);border-color:var(--accent2)">🗑️</button>`;
  openModalEl();
}

function openResModal(id){
  const r=resources.find(x=>x.id===id); if(!r) return;
  currentModalId=id; currentModalKind='resource';
  const m=TYPE_META[r.type]||TYPE_META.note;
  document.getElementById('modal-title').textContent=m.icon+' '+r.title;
  document.getElementById('modal-meta').innerHTML=
    `<span class="tag">${r.type.toUpperCase()}</span>`+
    (r.category?`<span class="tag">${esc(r.category)}</span>`:'')+
    (r.created?`<span style="font-size:11px;color:var(--text3)">${esc(r.created)}</span>`:'');
  let body='';
  if(r.desc) body+=`<div class="modal-section"><div class="modal-section-title">📄 الوصف</div><div class="modal-text">${esc(r.desc)}</div></div>`;
  if(r.type==='note'&&r.note) body+=`<div class="modal-section"><div class="modal-section-title">📝 المحتوى</div><div class="note-content-area">${esc(r.note)}</div></div>`;
  if(r.link) body+=`<div class="modal-section"><div class="modal-section-title">🔗 الرابط</div><div class="modal-text"><a href="${esc(r.link)}" target="_blank" style="color:var(--accent)">${esc(r.link)}</a></div></div>`;
  if(r.tags&&r.tags.length) body+=`<div class="modal-section"><div class="modal-section-title">🏷️ تاجات</div><div class="card-tags">${r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`;
  document.getElementById('modal-body').innerHTML=body;

  let footer='';
  if(r.type==='note'&&r.note)
    footer+=`<button class="modal-copy-btn" onclick="copyNote(${id})">📋 نسخ المحتوى</button>`;
  else if(r.link)
    footer+=`<a class="modal-copy-btn" href="${esc(r.link)}" target="_blank" style="text-decoration:none">${m.btnLabel}</a>`;
  footer+=`<button class="btn btn-ghost" onclick="editRes(${id})" style="flex-shrink:0">✏️</button>
           <button class="btn btn-ghost" onclick="deleteRes(${id})" style="flex-shrink:0;color:var(--accent2);border-color:var(--accent2)">🗑️</button>`;
  document.getElementById('modal-footer').innerHTML=footer;
  openModalEl();
}

function openModalEl(){
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){ if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow=''; currentModalId=null; }

function copyFromModal(){
  const p=prompts.find(x=>x.id===currentModalId); if(!p) return;
  navigator.clipboard.writeText(p.prompt).then(()=>{
    const btn=document.getElementById('mcopy');
    if(btn){btn.textContent='✅ تم النسخ!';btn.classList.add('copied');}
    toast();
    setTimeout(()=>{if(btn){btn.textContent='📋 نسخ البرومبت';btn.classList.remove('copied');}},2000);
  });
}
function copyNote(id){
  const r=resources.find(x=>x.id===id); if(!r) return;
  navigator.clipboard.writeText(r.note||'').then(()=>toast('✅ تم نسخ الملاحظة!'));
}

// ─── CRUD PROMPTS ─────────────────────────────────────────────────────────
function editPrompt(id){ closeModalDirect(); openPanel('prompt',id); }
function deletePrompt(id){
  if(!confirm('هتمسح البرومبت ده؟')) return;
  prompts=prompts.filter(x=>x.id!==id); save(); closeModalDirect(); renderAll();
}
function savePrompt(){
  const title=document.getElementById('f-title').value.trim();
  const prompt=document.getElementById('f-prompt').value.trim();
  if(!title||!prompt){alert('الاسم والبرومبت مطلوبين!');return;}
  const editId=+document.getElementById('editId').textContent;
  const imgEl=document.getElementById('f-image-preview');
  const imgData=(imgEl&&imgEl.style.display!=='none'&&imgEl.src&&imgEl.src.startsWith('data:'))?imgEl.src:'';
  const d={title,category:document.getElementById('f-category').value.trim(),tool:document.getElementById('f-tool').value.trim(),purpose:document.getElementById('f-purpose').value.trim(),prompt,tips:document.getElementById('f-tips').value.trim(),tags:document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),image:imgData,created:now()};
  if(editId){ const i=prompts.findIndex(x=>x.id===editId); if(i>-1) prompts[i]={...prompts[i],...d}; }
  else{ d.id=(prompts.reduce((m,p)=>Math.max(m,typeof p.id==='number'&&p.id<1000000?p.id:0),0))+1; prompts.push(d); }
  save(); closePanel(); renderAll(); toast('✅ تم الحفظ!');
}

function editRes(id){ closeModalDirect(); openPanel('resource',id); }
function deleteRes(id){
  if(!confirm('هتمسح العنصر ده؟')) return;
  resources=resources.filter(x=>x.id!==id); save(); closeModalDirect(); renderAll();
}
function saveResource(){
  const title=document.getElementById('r-title').value.trim();
  if(!title){alert('العنوان مطلوب!');return;}
  const editId=+document.getElementById('editId').textContent;
  const d={type:selectedType,title,desc:document.getElementById('r-desc').value.trim(),category:document.getElementById('r-category').value.trim(),link:document.getElementById('r-link').value.trim(),note:document.getElementById('r-note').value.trim(),tags:document.getElementById('r-tags').value.split(',').map(t=>t.trim()).filter(Boolean),created:now()};
  if(editId){ const i=resources.findIndex(x=>x.id===editId); if(i>-1) resources[i]={...resources[i],...d}; }
  else{ d.id=Date.now(); resources.push(d); }
  save(); closePanel(); renderAll(); toast('✅ تم الحفظ!');
}

// ─── PANEL ────────────────────────────────────────────────────────────────
function previewImg(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=document.getElementById('f-image-preview');
    const ph=document.getElementById('f-img-placeholder');
    img.src=e.target.result; img.style.display='block';
    if(ph) ph.style.display='none';
  };
  reader.readAsDataURL(file);
}

function openPanel(mode, editId=null){
  mode=mode||(currentTab==='library'?'resource':'prompt');
  switchPanelTab(mode);
  document.getElementById('editId').textContent='';

  if(mode==='prompt'){
    ['title','category','tool','purpose','prompt','tips','tags'].forEach(f=>document.getElementById('f-'+f).value=''); const _pi=document.getElementById('f-image-preview'); if(_pi){_pi.src='';_pi.style.display='none';} const _pp=document.getElementById('f-img-placeholder'); if(_pp) _pp.style.display='';
    if(editId){ const p=prompts.find(x=>x.id===editId); if(p){document.getElementById('f-title').value=p.title||'';document.getElementById('f-category').value=p.category||'';document.getElementById('f-tool').value=p.tool||'';document.getElementById('f-purpose').value=p.purpose||'';document.getElementById('f-prompt').value=p.prompt||'';document.getElementById('f-tips').value=p.tips||'';document.getElementById('f-tags').value=(p.tags||[]).join(', ');document.getElementById('editId').textContent=editId; if(p.image){const _pi=document.getElementById('f-image-preview');if(_pi){_pi.src=p.image;_pi.style.display='block';const _pp=document.getElementById('f-img-placeholder');if(_pp)_pp.style.display='none';}} } }
  } else {
    ['title','desc','category','link','note','tags'].forEach(f=>document.getElementById('r-'+f).value='');
    if(editId){ const r=resources.find(x=>x.id===editId); if(r){selectType(r.type); document.getElementById('r-title').value=r.title||'';document.getElementById('r-desc').value=r.desc||'';document.getElementById('r-category').value=r.category||'';document.getElementById('r-link').value=r.link||'';document.getElementById('r-note').value=r.note||'';document.getElementById('r-tags').value=(r.tags||[]).join(', ');document.getElementById('editId').textContent=editId;} }
  }
  document.getElementById('panelTitle').textContent=editId?'✏️ تعديل':'➕ إضافة جديد';
  document.getElementById('addPanel').classList.add('open');
}
function closePanel(){ document.getElementById('addPanel').classList.remove('open'); }

function switchPanelTab(mode){
  panelTabMode=mode;
  document.getElementById('ptab-prompt').classList.toggle('active',mode==='prompt');
  document.getElementById('ptab-resource').classList.toggle('active',mode==='resource');
  document.getElementById('form-prompt').style.display=mode==='prompt'?'':'none';
  document.getElementById('form-resource').style.display=mode==='resource'?'':'none';
}

function selectType(type, el){
  selectedType=type;
  document.querySelectorAll('.type-opt').forEach(b=>b.classList.remove('selected'));
  if(el) el.classList.add('selected');
  else { const found=document.querySelector(`.type-opt[data-type="${type}"]`); if(found) found.classList.add('selected'); }
  document.getElementById('note-field').style.display=type==='note'?'':'none';
  document.getElementById('link-field').style.display=type==='note'?'none':'';
}

// ─── THEME ────────────────────────────────────────────────────────────────
let isDark=localStorage.getItem('ai_theme')!=='light';
function applyTheme(){ document.body.classList.toggle('light',!isDark); document.querySelector('.theme-toggle').textContent=isDark?'🌙':'☀️'; }
function toggleTheme(){ isDark=!isDark; localStorage.setItem('ai_theme',isDark?'dark':'light'); applyTheme(); }
applyTheme();

// ─── INIT ─────────────────────────────────────────────────────────────────
renderAll();
</script>
